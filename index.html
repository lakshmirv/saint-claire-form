<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saint Claire ICP Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h2 {
      border-bottom: 2px solid #ccc;
      padding-bottom: 5px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
    }
    .section {
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <h1>Saint Claire ICP Submission Form</h1>

  <form id="icpForm">

    <div class="section">
      <h2>1. Company Information</h2>
      <label for="companyName">Company Name</label>
      <input type="text" id="companyName" name="companyName" required />

      <label for="facilityAddress">Facility Address</label>
      <input type="text" id="facilityAddress" name="facilityAddress" required />

      <label for="facilityLatLong">Facility Latitude/Longitude</label>
      <input type="text" id="facilityLatLong" name="facilityLatLong" />

      <label for="facilityPhone">Facility Phone Number</label>
      <input type="tel" id="facilityPhone" name="facilityPhone" />

      <label for="startDate">Beginning Date of Operations</label>
      <input type="date" id="startDate" name="startDate" />

      <label for="sicCode">SIC Code</label>
      <input type="text" id="sicCode" name="sicCode" />

      <label for="naicsCode">NAICS Code</label>
      <input type="text" id="naicsCode" name="naicsCode" />
    </div>

    <div class="section">
      <h2>2. Owner and Operator Info</h2>
      <label for="ownerName">Owner Name</label>
      <input type="text" id="ownerName" name="ownerName" />

      <label for="ownerPhone">Owner Phone Number</label>
      <input type="tel" id="ownerPhone" name="ownerPhone" />

      <label for="operatorName">Operator Name</label>
      <input type="text" id="operatorName" name="operatorName" />

      <label for="operatorPhone">Operator Phone Number</label>
      <input type="tel" id="operatorPhone" name="operatorPhone" />
    </div>

    <div class="section">
      <h2>3. Qualified Individual</h2>
      <label for="qiName">Qualified Individual Name</label>
      <input type="text" id="qiName" name="qiName" />

      <label for="qiAddress">Qualified Individual Address</label>
      <input type="text" id="qiAddress" name="qiAddress" />

      <label for="qiAlternate">Alternate</label>
      <input type="text" id="qiAlternate" name="qiAlternate" />
    </div>

    <div class="section">
      <label for="additionalComments">Additional Comments</label>
      <textarea id="additionalComments" name="additionalComments"></textarea>
    </div>

    <input type="submit" value="Submit" />
  </form>

  <script>
  document.getElementById('icpForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const form = e.target;
    const data = {
      companyName: form.companyName.value,
      facilityAddress: form.facilityAddress.value,
      facilityLatLong: form.facilityLatLong.value,
      facilityPhone: form.facilityPhone.value,
      startDate: form.startDate.value,
      sicCode: form.sicCode.value,
      naicsCode: form.naicsCode.value,
      ownerName: form.ownerName.value,
      ownerPhone: form.ownerPhone.value,
      operatorName: form.operatorName.value,
      operatorPhone: form.operatorPhone.value,
      qiName: form.qiName.value,
      qiAddress: form.qiAddress.value,
      qiAlternate: form.qiAlternate.value,
      additionalComments: form.additionalComments.value
    };

    fetch("https://corsproxy.io/?" + encodeURIComponent("https://script.google.com/macros/s/AKfycbyzPJpsLSVncbI_jgtuw6AtOSEx17tiKGuPspQ5Ai48oPn-9D9JCM0krO9wEzI1CVErmQ/exec"), {
  method: "POST",
  body: JSON.stringify(data),
  headers: {
    "Content-Type": "application/json"
  }
})
.then(response => response.json())
.then(result => {
  if (result.success) {
    alert("Form submitted successfully!");
    form.reset();
  } else {
    alert("Submission failed: " + result.error);
  }
})
.catch(error => {
  console.error("Fetch error:", error);
  alert("Submission failed: " + error.message);
});
    .then(response => {
      if (response.ok) {
        alert("Form submitted successfully!");
        form.reset();
      } else {
        response.text().then(text => {
          alert("Submission failed. Server responded with: " + text);
        });
      }
    })
    .catch(error => {
      console.error("Fetch error:", error);
      alert("Submission failed: " + error.message);
    });
  });
</script>
</body>
</html>
